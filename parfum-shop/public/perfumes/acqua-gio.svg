<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d3d3d"/>
      <stop offset="100%" stop-color="#3d3d3dCC"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0c0c044"/>
      <stop offset="50%" stop-color="#c0c0c088"/>
      <stop offset="100%" stop-color="#c0c0c022"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Bottle shape -->
  <rect x="115" y="80" width="70" height="16" rx="4" fill="#c0c0c099"/>
  <rect x="125" y="60" width="50" height="24" rx="3" fill="#c0c0c077"/>
  <rect x="90" y="96" width="120" height="200" rx="18" fill="url(#bottle)" stroke="#c0c0c066" stroke-width="1.5"/>
  <!-- Shine -->
  <rect x="100" y="110" width="18" height="160" rx="9" fill="#c0c0c022"/>
  <!-- Label -->
  <rect x="100" y="170" width="100" height="80" rx="4" fill="#3d3d3dCC"/>
  <text x="150" y="200" font-family="serif" font-size="11" fill="#c0c0c0" text-anchor="middle" font-weight="bold" letter-spacing="2">ARMANI</text>
  <line x1="115" y1="207" x2="185" y2="207" stroke="#c0c0c088" stroke-width="0.5"/>
  <text x="150" y="222" font-family="serif" font-size="10" fill="#c0c0c0cc" text-anchor="middle">Acqua di Giò</text>
  <!-- Brand bottom -->
  <text x="150" y="360" font-family="serif" font-size="13" fill="#c0c0c066" text-anchor="middle" letter-spacing="3">Armani</text>
</svg>
