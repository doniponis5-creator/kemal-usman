<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#b8860bCC"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd70044"/>
      <stop offset="50%" stop-color="#ffd70088"/>
      <stop offset="100%" stop-color="#ffd70022"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Bottle shape -->
  <rect x="115" y="80" width="70" height="16" rx="4" fill="#ffd70099"/>
  <rect x="125" y="60" width="50" height="24" rx="3" fill="#ffd70077"/>
  <rect x="90" y="96" width="120" height="200" rx="18" fill="url(#bottle)" stroke="#ffd70066" stroke-width="1.5"/>
  <!-- Shine -->
  <rect x="100" y="110" width="18" height="160" rx="9" fill="#ffd70022"/>
  <!-- Label -->
  <rect x="100" y="170" width="100" height="80" rx="4" fill="#b8860bCC"/>
  <text x="150" y="200" font-family="serif" font-size="11" fill="#ffd700" text-anchor="middle" font-weight="bold" letter-spacing="2">YSL</text>
  <line x1="115" y1="207" x2="185" y2="207" stroke="#ffd70088" stroke-width="0.5"/>
  <text x="150" y="222" font-family="serif" font-size="10" fill="#ffd700cc" text-anchor="middle">Y EDP</text>
  <!-- Brand bottom -->
  <text x="150" y="360" font-family="serif" font-size="13" fill="#ffd70066" text-anchor="middle" letter-spacing="3">YSL</text>
</svg>
