<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#1a1a2eCC"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a96e44"/>
      <stop offset="50%" stop-color="#c9a96e88"/>
      <stop offset="100%" stop-color="#c9a96e22"/>
    </linearGradient>
  </defs>
  <rect width="300" height="400" fill="url(#bg)"/>
  <!-- Bottle shape -->
  <rect x="115" y="80" width="70" height="16" rx="4" fill="#c9a96e99"/>
  <rect x="125" y="60" width="50" height="24" rx="3" fill="#c9a96e77"/>
  <rect x="90" y="96" width="120" height="200" rx="18" fill="url(#bottle)" stroke="#c9a96e66" stroke-width="1.5"/>
  <!-- Shine -->
  <rect x="100" y="110" width="18" height="160" rx="9" fill="#c9a96e22"/>
  <!-- Label -->
  <rect x="100" y="170" width="100" height="80" rx="4" fill="#1a1a2eCC"/>
  <text x="150" y="200" font-family="serif" font-size="11" fill="#c9a96e" text-anchor="middle" font-weight="bold" letter-spacing="2">DIOR</text>
  <line x1="115" y1="207" x2="185" y2="207" stroke="#c9a96e88" stroke-width="0.5"/>
  <text x="150" y="222" font-family="serif" font-size="10" fill="#c9a96ecc" text-anchor="middle">Sauvage</text>
  <!-- Brand bottom -->
  <text x="150" y="360" font-family="serif" font-size="13" fill="#c9a96e66" text-anchor="middle" letter-spacing="3">Dior</text>
</svg>
